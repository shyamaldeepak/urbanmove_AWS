# ════════════════════════════════════════════════════════════════════
# UrbanMove — Docker Compose (Local Dev / Demo)
# Replaces: RDS → postgres, ElastiCache → redis, MSK → kafka
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up --build app      # start only the Flask app
#   docker compose down -v             # stop + remove volumes
# ════════════════════════════════════════════════════════════════════

name: urbanmove

services:

  # ── PostgreSQL (replaces RDS) ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: urbanmove-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       urbanmove
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: UrbanDB!Secure2025
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./urbanmove/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d urbanmove"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (replaces ElastiCache) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: urbanmove-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Zookeeper (required by Kafka) ────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: urbanmove-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  # ── Kafka (replaces MSK) ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: urbanmove-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka topic initialiser (runs once then exits) ────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: urbanmove-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      echo 'Creating Kafka topics…'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic urbanmove.gps.events    --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic urbanmove.sensor.events --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic urbanmove.congestion    --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic urbanmove.routes        --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic urbanmove.alerts        --partitions 3 --replication-factor 1
      echo 'All topics created.'
      "
    restart: "no"

  # ── Flask App ────────────────────────────────────────────────────
  app:
    build:
      context: ./urbanmove
      dockerfile: Dockerfile
    container_name: urbanmove-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      # Database
      DB_HOST:    postgres
      DB_PORT:    "5432"
      DB_NAME:    urbanmove
      DB_USER:    admin
      DB_PASS:    UrbanDB!Secure2025
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Kafka (internal Docker network address)
      KAFKA_BROKERS: kafka:29092
      # S3 / Cognito / SNS — leave blank locally, app has mock fallbacks
      AWS_REGION:         us-east-1
      S3_RAW_BUCKET:      ""
      S3_ANALYTICS_BUCKET: ""
      COGNITO_POOL_ID:    ""
      COGNITO_CLIENT_ID:  ""
      SNS_TOPIC_ARN:      ""
      # App
      PORT:       "5000"
      NODE_ENV:   development
      JWT_SECRET: local-dev-secret-change-in-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Stream Processor (Kafka → Postgres / Redis) ──────────────────
  processor:
    build:
      context: ./urbanmove
      dockerfile: Dockerfile
    container_name: urbanmove-processor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    # Override the default gunicorn CMD — run consumer.py instead
    command: ["python", "consumer.py"]
    environment:
      DB_HOST:       postgres
      DB_PORT:       "5432"
      DB_NAME:       urbanmove
      DB_USER:       admin
      DB_PASS:       UrbanDB!Secure2025
      REDIS_HOST:    redis
      REDIS_PORT:    "6379"
      KAFKA_BROKERS: kafka:29092
      AWS_REGION:    us-east-1
      SNS_TOPIC_ARN: ""

  # ── GPS Simulator (optional — comment out if not needed) ─────────
  simulator:
    build:
      context: ./urbanmove
      dockerfile: Dockerfile
    container_name: urbanmove-simulator
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - python
      - simulator/gps_generator.py
      - --brokers
      - kafka:29092
      - --topic
      - urbanmove.gps.events
      - --vehicles
      - "50"
      - --rate
      - "1.0"
    environment:
      KAFKA_BROKERS: kafka:29092

# ── Named volumes ────────────────────────────────────────────────────
volumes:
  postgres_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
