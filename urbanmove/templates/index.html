<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrbanMove — Smart Mobility Platform</title>
  <meta name="description" content="UrbanMove real-time cloud-native mobility dashboard. Live GPS tracking, congestion monitoring, and fleet management." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #05060f;
      --surface:   rgba(255,255,255,0.04);
      --border:    rgba(255,255,255,0.08);
      --accent:    #7c3aed;
      --accent2:   #06b6d4;
      --success:   #10b981;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --glow:      0 0 24px rgba(124,58,237,.35);
      --radius:    14px;
      --font:      'Inter', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Layout ─────────────────────────────────────────────────── */
    #app { display: grid; grid-template-rows: 58px 1fr; grid-template-columns: 280px 1fr 300px; height: 100vh; gap: 0; }

    /* ── Header ─────────────────────────────────────────────────── */
    #header {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: rgba(5,6,15,.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 999;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; box-shadow: var(--glow);
      animation: pulse-logo 3s ease-in-out infinite;
    }
    @keyframes pulse-logo {
      0%,100% { box-shadow: 0 0 16px rgba(124,58,237,.4); }
      50%      { box-shadow: 0 0 32px rgba(6,182,212,.5); }
    }
    .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -.3px;
      background: linear-gradient(90deg, #a78bfa, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: .5px; font-weight: 500; }

    #live-badge {
      display: flex; align-items: center; gap: 6px;
      background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.3);
      padding: 4px 12px; border-radius: 999px; font-size: 12px; color: var(--success); font-weight: 600;
    }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--success); animation: blink 1.2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    #header-right { display: flex; align-items: center; gap: 14px; }
    .header-stat { text-align: right; }
    .header-stat .val { font-size: 15px; font-weight: 700; color: var(--accent2); font-family: var(--mono); }
    .header-stat .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; }
    #clock { font-family: var(--mono); font-size: 13px; color: var(--muted); }

    /* ── Left Sidebar ────────────────────────────────────────────── */
    #sidebar-left {
      background: rgba(255,255,255,.02);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 0; overflow: hidden;
    }

    .panel-title {
      padding: 14px 16px 10px;
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    /* Stats grid */
    #stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px;
      transition: border-color .2s, transform .2s;
    }
    .stat-card:hover { border-color: rgba(124,58,237,.4); transform: translateY(-1px); }
    .stat-card .icon { font-size: 18px; margin-bottom: 6px; }
    .stat-card .val {
      font-family: var(--mono); font-size: 22px; font-weight: 700; line-height: 1;
      background: linear-gradient(135deg, #a78bfa, var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    /* Alert feed */
    #alert-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-top: 1px solid var(--border); }
    #alert-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    #alert-list::-webkit-scrollbar { width: 3px; }
    #alert-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

    .alert-item {
      padding: 9px 12px; border-radius: 10px;
      border-left: 3px solid var(--muted);
      background: var(--surface); font-size: 12px; line-height: 1.4;
      animation: slide-in .3s ease;
      transition: opacity .2s;
    }
    @keyframes slide-in { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: none; } }
    .alert-item.info     { border-color: var(--accent2); }
    .alert-item.warning  { border-color: var(--warn); }
    .alert-item.critical { border-color: var(--danger); background: rgba(239,68,68,.07); }
    .alert-item .a-type  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; opacity: .7; }
    .alert-item .a-msg   { margin-top: 2px; color: var(--text); }
    .alert-item .a-time  { font-size: 10px; color: var(--muted); margin-top: 3px; font-family: var(--mono); }

    /* ── Map ────────────────────────────────────────────────────── */
    #map-wrap { position: relative; }
    #map { width: 100%; height: 100%; z-index: 1; }

    /* Map overlay controls */
    #map-controls {
      position: absolute; top: 14px; left: 14px; z-index: 10;
      display: flex; gap: 8px;
    }
    .map-btn {
      background: rgba(5,6,15,.85); backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 7px 14px; font-size: 12px; font-weight: 600; color: var(--text);
      cursor: pointer; transition: all .18s; font-family: var(--font);
    }
    .map-btn:hover, .map-btn.active { background: rgba(124,58,237,.25); border-color: var(--accent); color: #a78bfa; }

    #refresh-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transform-origin: left; transform: scaleX(0); z-index: 10;
      transition: transform 3s linear;
    }
    #refresh-bar.running { transform: scaleX(1); }

    /* ── Right Sidebar ───────────────────────────────────────────── */
    #sidebar-right {
      background: rgba(255,255,255,.02);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* Vehicle list */
    #vehicle-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid var(--border); }
    #vehicle-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
    #vehicle-list::-webkit-scrollbar { width: 3px; }
    #vehicle-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }

    .vehicle-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 11px; border-radius: 10px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: all .18s; font-size: 12px;
    }
    .vehicle-item:hover { border-color: rgba(124,58,237,.4); background: rgba(124,58,237,.08); }
    .vehicle-item.selected { border-color: var(--accent); background: rgba(124,58,237,.15); }
    .v-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .v-info { flex: 1; min-width: 0; }
    .v-id   { font-weight: 700; font-family: var(--mono); font-size: 11px; }
    .v-type { font-size: 10px; color: var(--muted); text-transform: capitalize; }
    .v-speed { font-size: 11px; font-family: var(--mono); color: var(--accent2); font-weight: 600; }
    .v-status { font-size: 9px; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 5px; letter-spacing: .5px; }
    .status-moving      { background: rgba(16,185,129,.15);  color: var(--success); }
    .status-stopped     { background: rgba(100,116,139,.15); color: var(--muted); }
    .status-delayed     { background: rgba(245,158,11,.15);  color: var(--warn); }
    .status-maintenance { background: rgba(239,68,68,.15);   color: var(--danger); }

    /* Congestion panel */
    #cong-section { display: flex; flex-direction: column; overflow: hidden; }
    #cong-list { overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 5px; max-height: 200px; }

    .cong-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 11px; border-radius: 9px;
      background: var(--surface); border: 1px solid var(--border); font-size: 12px;
    }
    .cong-name { color: var(--text); font-weight: 500; }
    .cong-bar-wrap { flex: 1; margin: 0 10px; height: 4px; background: rgba(255,255,255,.07); border-radius: 2px; }
    .cong-bar { height: 100%; border-radius: 2px; transition: width .5s ease; }
    .cong-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px; text-transform: uppercase; }
    .cong-high     .cong-bar { background: var(--danger);  width: 90%; }
    .cong-high     .cong-badge { background: rgba(239,68,68,.2);   color: var(--danger); }
    .cong-medium   .cong-bar { background: var(--warn);   width: 55%; }
    .cong-medium   .cong-badge { background: rgba(245,158,11,.2);  color: var(--warn); }
    .cong-critical .cong-bar { background: #ff1a1a;        width: 100%; }
    .cong-critical .cong-badge { background: rgba(255,26,26,.2); color: #ff4d4d; }
    .cong-low      .cong-bar { background: var(--success); width: 20%; }
    .cong-low      .cong-badge { background: rgba(16,185,129,.2); color: var(--success); }

    /* ── Leaflet overrides ───────────────────────────────────────── */
    .leaflet-container { background: #05060f !important; }
    .leaflet-control-zoom a { background: rgba(5,6,15,.9) !important; color: #a78bfa !important; border-color: var(--border) !important; }
    .leaflet-control-attribution { background: rgba(5,6,15,.7) !important; color: var(--muted) !important; font-size: 9px !important; }
    .leaflet-popup-content-wrapper { background: rgba(5,6,15,.95) !important; border: 1px solid rgba(124,58,237,.4) !important; color: var(--text) !important; border-radius: 12px !important; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(124,58,237,.2) !important; }
    .leaflet-popup-tip { background: rgba(5,6,15,.95) !important; }
    .leaflet-popup-content { margin: 14px 16px !important; font-family: var(--font) !important; min-width: 180px; }
    .popup-vid   { font-family: var(--mono); font-weight: 700; font-size: 14px; color: #a78bfa; }
    .popup-type  { font-size: 11px; color: var(--muted); text-transform: capitalize; margin-bottom: 8px; }
    .popup-row   { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
    .popup-row:last-child { border: none; }
    .popup-label { color: var(--muted); }
    .popup-val   { font-family: var(--mono); font-weight: 600; color: var(--accent2); }

    /* ── Scrollbar global ────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header id="header">
    <div class="logo">
      <div class="logo-icon">🚇</div>
      <div>
        <div class="logo-text">UrbanMove</div>
        <div class="logo-sub">Smart Mobility Platform</div>
      </div>
    </div>

    <div id="live-badge">
      <span class="live-dot"></span> LIVE
    </div>

    <div id="header-right">
      <div class="header-stat">
        <div class="val" id="h-vehicles">–</div>
        <div class="lbl">Vehicles</div>
      </div>
      <div class="header-stat">
        <div class="val" id="h-speed">–</div>
        <div class="lbl">Avg km/h</div>
      </div>
      <div class="header-stat">
        <div class="val" id="h-region">–</div>
        <div class="lbl">Region</div>
      </div>
      <div id="clock">00:00:00</div>
    </div>
  </header>

  <!-- ── Left Sidebar ── -->
  <aside id="sidebar-left">
    <div class="panel-title">Fleet Overview</div>
    <div id="stats-grid">
      <div class="stat-card">
        <div class="icon">🚌</div>
        <div class="val" id="s-vehicles">–</div>
        <div class="lbl">Active Vehicles</div>
      </div>
      <div class="stat-card">
        <div class="icon">🛣️</div>
        <div class="val" id="s-routes">–</div>
        <div class="lbl">Active Routes</div>
      </div>
      <div class="stat-card">
        <div class="icon">⚡</div>
        <div class="val" id="s-speed">–</div>
        <div class="lbl">Avg Speed</div>
      </div>
      <div class="stat-card">
        <div class="icon">🚨</div>
        <div class="val" id="s-cong">–</div>
        <div class="lbl">Congestion Zones</div>
      </div>
    </div>

    <div id="alert-section">
      <div class="panel-title">Live Alerts</div>
      <div id="alert-list">
        <div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0;">Loading alerts…</div>
      </div>
    </div>
  </aside>

  <!-- ── Map ── -->
  <main id="map-wrap">
    <div id="map-controls">
      <button class="map-btn active" id="btn-all"     onclick="filterType('all')">All</button>
      <button class="map-btn"        id="btn-bus"     onclick="filterType('bus')">Bus</button>
      <button class="map-btn"        id="btn-metro"   onclick="filterType('metro')">Metro</button>
      <button class="map-btn"        id="btn-tram"    onclick="filterType('tram')">Tram</button>
      <button class="map-btn"        id="btn-shuttle" onclick="filterType('shuttle')">Shuttle</button>
    </div>
    <div id="map"></div>
    <div id="refresh-bar"></div>
  </main>

  <!-- ── Right Sidebar ── -->
  <aside id="sidebar-right">
    <div id="vehicle-section">
      <div class="panel-title">Vehicles</div>
      <div id="vehicle-list">
        <div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0;">Loading vehicles…</div>
      </div>
    </div>

    <div id="cong-section">
      <div class="panel-title">Congestion Zones</div>
      <div id="cong-list">
        <div style="text-align:center;color:var(--muted);font-size:12px;padding:16px 0;">Loading…</div>
      </div>
    </div>
  </aside>

</div>

<script>
/* ── Config ──────────────────────────────────────────────────────── */
const POLL_MS   = 3000;
const BASE      = '';          // same origin
const TYPE_COLORS = {
  bus:     '#f59e0b',
  metro:   '#7c3aed',
  tram:    '#06b6d4',
  shuttle: '#10b981',
  default: '#a78bfa',
};

/* ── State ───────────────────────────────────────────────────────── */
let markers   = {};   // vehicle_id → L.marker
let vehicles  = [];
let activeFilter = 'all';
let selectedId   = null;

/* ── Map init ────────────────────────────────────────────────────── */
const map = L.map('map', {
  center: [48.8566, 2.3522],
  zoom: 13,
  zoomControl: true,
  preferCanvas: true,
}).addLayer(
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19,
  })
);

/* ── Vehicle icon factory ────────────────────────────────────────── */
function typeEmoji(type) {
  return { bus:'🚌', metro:'🚇', tram:'🚋', shuttle:'🚐' }[type] || '🚗';
}

function makeIcon(type, status) {
  const color = TYPE_COLORS[type] || TYPE_COLORS.default;
  const opacity = status === 'stopped' ? .5 : 1;
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
      <circle cx="18" cy="18" r="14" fill="${color}" fill-opacity="${opacity * .18}" stroke="${color}" stroke-width="1.5" stroke-opacity="${opacity}"/>
      <circle cx="18" cy="18" r="8"  fill="${color}" fill-opacity="${opacity * .9}"/>
      <circle cx="18" cy="18" r="4"  fill="white" fill-opacity="${opacity}"/>
    </svg>`;
  return L.divIcon({
    className: '',
    html: svg,
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    popupAnchor: [0, -20],
  });
}

/* ── Popup HTML ──────────────────────────────────────────────────── */
function popupHTML(v) {
  const statusClass = `status-${v.status || 'moving'}`;
  return `
    <div class="popup-vid">${v.vehicle_id}</div>
    <div class="popup-type">${typeEmoji(v.type)} ${v.type || 'vehicle'} &nbsp;
      <span class="v-status ${statusClass}">${v.status || 'moving'}</span>
    </div>
    <div class="popup-row"><span class="popup-label">Speed</span><span class="popup-val">${(v.speed_kmh || 0).toFixed(1)} km/h</span></div>
    <div class="popup-row"><span class="popup-label">Heading</span><span class="popup-val">${(v.heading || 0).toFixed(0)}°</span></div>
    <div class="popup-row"><span class="popup-label">Passengers</span><span class="popup-val">${v.passengers ?? '—'}</span></div>
    <div class="popup-row"><span class="popup-label">Route</span><span class="popup-val">${v.route_id ?? '—'}</span></div>
    <div class="popup-row"><span class="popup-label">Updated</span><span class="popup-val">${v.last_seen ? new Date(v.last_seen).toLocaleTimeString() : '—'}</span></div>`;
}

/* ── Update markers ──────────────────────────────────────────────── */
function updateMarkers(data) {
  const visible = activeFilter === 'all' ? data : data.filter(v => v.type === activeFilter);
  const seen = new Set();

  visible.forEach(v => {
    if (!v.lat || !v.lon) return;
    seen.add(v.vehicle_id);
    const icon = makeIcon(v.type, v.status);

    if (markers[v.vehicle_id]) {
      markers[v.vehicle_id].setLatLng([v.lat, v.lon]).setIcon(icon).setPopupContent(popupHTML(v));
    } else {
      const m = L.marker([v.lat, v.lon], { icon })
        .bindPopup(popupHTML(v))
        .on('click', () => selectVehicle(v.vehicle_id));
      m.addTo(map);
      markers[v.vehicle_id] = m;
    }
  });

  // Remove stale
  Object.keys(markers).forEach(id => {
    if (!seen.has(id)) { markers[id].remove(); delete markers[id]; }
  });
}

/* ── Vehicle list ────────────────────────────────────────────────── */
function renderVehicleList(data) {
  const el = document.getElementById('vehicle-list');
  if (!data.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0;">No vehicles</div>'; return; }
  el.innerHTML = data.map(v => {
    const color = TYPE_COLORS[v.type] || TYPE_COLORS.default;
    return `
      <div class="vehicle-item ${v.vehicle_id === selectedId ? 'selected' : ''}"
           id="vi-${v.vehicle_id}" onclick="selectVehicle('${v.vehicle_id}')">
        <div class="v-dot" style="background:${color}"></div>
        <div class="v-info">
          <div class="v-id">${v.vehicle_id}</div>
          <div class="v-type">${typeEmoji(v.type)} ${v.type}</div>
        </div>
        <div style="text-align:right">
          <div class="v-speed">${(v.speed_kmh || 0).toFixed(0)} km/h</div>
          <div class="v-status status-${v.status || 'moving'}">${v.status || 'moving'}</div>
        </div>
      </div>`;
  }).join('');
}

function selectVehicle(id) {
  selectedId = id;
  document.querySelectorAll('.vehicle-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById(`vi-${id}`);
  if (el) { el.classList.add('selected'); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
  const m = markers[id];
  if (m) { map.panTo(m.getLatLng()); m.openPopup(); }
}

/* ── Filter ──────────────────────────────────────────────────────── */
function filterType(type) {
  activeFilter = type;
  document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${type}`)?.classList.add('active');
  updateMarkers(vehicles);
  renderVehicleList(type === 'all' ? vehicles : vehicles.filter(v => v.type === type));
}

/* ── Stats ───────────────────────────────────────────────────────── */
function animateNum(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  const start = parseFloat(el.textContent) || 0;
  const diff  = target - start;
  const dur   = 600;
  const t0    = performance.now();
  const isFloat = String(target).includes('.');
  function step(t) {
    const p = Math.min((t - t0) / dur, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    el.textContent = isFloat ? (start + diff * ease).toFixed(1) : Math.round(start + diff * ease);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

async function fetchStats() {
  try {
    const d = await fetch(`${BASE}/api/stats`).then(r => r.json());
    animateNum('s-vehicles', d.active_vehicles);
    animateNum('s-routes',   d.active_routes);
    animateNum('s-speed',    d.avg_speed_kmh);
    animateNum('s-cong',     d.congestion_zones);
    document.getElementById('h-vehicles').textContent = d.active_vehicles;
    document.getElementById('h-speed').textContent    = d.avg_speed_kmh?.toFixed(1);
    document.getElementById('h-region').textContent   = d.region || 'us-east-1';
  } catch {}
}

/* ── Alerts ──────────────────────────────────────────────────────── */
async function fetchAlerts() {
  try {
    const data = await fetch(`${BASE}/api/alerts`).then(r => r.json());
    const el = document.getElementById('alert-list');
    if (!data.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:20px 0;">No alerts</div>'; return; }
    el.innerHTML = data.slice(0,12).map(a => `
      <div class="alert-item ${a.severity || 'info'}">
        <div class="a-type">${a.type || 'info'} · ${(a.severity || 'info').toUpperCase()}</div>
        <div class="a-msg">${a.message}</div>
        <div class="a-time">${a.created_at ? new Date(a.created_at).toLocaleTimeString() : a.ts ? new Date(a.ts).toLocaleTimeString() : 'just now'}</div>
      </div>`).join('');
  } catch {}
}

/* ── Congestion ──────────────────────────────────────────────────── */
async function fetchCongestion() {
  try {
    const data = await fetch(`${BASE}/api/congestion`).then(r => r.json());
    const el   = document.getElementById('cong-list');
    if (!data.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px 0;">No data</div>'; return; }
    el.innerHTML = data.map(c => `
      <div class="cong-item cong-${c.level}">
        <span class="cong-name">${c.zone_name}</span>
        <div class="cong-bar-wrap"><div class="cong-bar"></div></div>
        <span class="cong-badge">${c.level}</span>
      </div>`).join('');
  } catch {}
}

/* ── Vehicles ────────────────────────────────────────────────────── */
async function fetchVehicles() {
  try {
    const data = await fetch(`${BASE}/api/vehicles`).then(r => r.json());
    vehicles = Array.isArray(data) ? data : [];
    updateMarkers(vehicles);
    const filtered = activeFilter === 'all' ? vehicles : vehicles.filter(v => v.type === activeFilter);
    renderVehicleList(filtered);
  } catch {}
}

/* ── Progress bar ────────────────────────────────────────────────── */
function animateBar() {
  const bar = document.getElementById('refresh-bar');
  bar.style.transition = 'none';
  bar.style.transform  = 'scaleX(0)';
  requestAnimationFrame(() => {
    bar.style.transition = `transform ${POLL_MS}ms linear`;
    bar.style.transform  = 'scaleX(1)';
  });
}

/* ── Clock ───────────────────────────────────────────────────────── */
function tickClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}

/* ── Boot ────────────────────────────────────────────────────────── */
async function init() {
  tickClock();
  setInterval(tickClock, 1000);

  await Promise.all([fetchVehicles(), fetchStats(), fetchAlerts(), fetchCongestion()]);

  animateBar();
  setInterval(async () => {
    await fetchVehicles();
    await Promise.all([fetchStats(), fetchAlerts(), fetchCongestion()]);
    animateBar();
  }, POLL_MS);
}

init();
</script>
</body>
</html>
